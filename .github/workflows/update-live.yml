name: Update Chzzk Live Status

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run live status scraper
        run: |
          node -e '
          const fs = require("fs");
          const https = require("https");

          // 대시보드 멤버들의 치지직 고유 채널 ID 목록 직접 매핑
          const channelIds = [
            "be242dede50d12910ae8d382f55b0ff7", // 망시
            "565d031e396d5b470a00325803563b29", // 찬울
            "25ec65d9bfdf37ac9f7ff50b75bfbe", // 카루하
            "39dda2e694fe6797cb9e6a12e84c2808", // 엄크술사
            "d52a1590fe8cb87e4afc3714e453864f", // 아모크
            "d27aa8b36153469303374ef5c695f0f7", // 은송아지
            "5cd51d3c832c0fd8b133d1e6ae08349c", // 고보미
            "19bff066c2a68a2f04d570f66b7ba869"  // 하늘루틴
          ];

          async function checkAll() {
            const liveResults = {};

            for (const chzzkId of channelIds) {
              try {
                const liveData = await new Promise((resolve) => {
                  const api = `https://api.chzzk.naver.com/service/v1/channels/${chzzkId}/live-detail`;
                  const options = {
                    headers: {
                      "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
                      "Referer": "https://chzzk.naver.com"
                    }
                  };

                  https.get(api, options, (res) => {
                    let resData = "";
                    res.on("data", (chunk) => resData += chunk);
                    res.on("end", () => {
                      try {
                        const json = JSON.parse(resData);
                        resolve(json.content);
                      } catch (e) { resolve(null); }
                    });
                  }).on("error", () => resolve(null));
                });

                if (liveData && liveData.status === "OPEN") {
                  liveResults[chzzkId] = {
                    isLive: true,
                    liveTitle: liveData.liveTitle || "라이브 방송 중",
                    concurrentUserCount: liveData.concurrentUserCount || 0
                  };
                  console.log(`[LIVE DETECTED] Channel: ${chzzkId} - Title: ${liveData.liveTitle}`);
                }
              } catch (e) {
                console.error(`Error checking channel ${chzzkId}:`, e);
              }
            }

            fs.writeFileSync("live-status.json", JSON.stringify({ updated_at: new Date().toISOString(), lives: liveResults }, null, 2));
            console.log("Live status updated successfully:", liveResults);
          }

          checkAll();
          '

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.io"
          git pull origin ${{ github.ref_name }} --rebase || echo "No remote changes to pull"
          git add live-status.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update live status" && git push origin HEAD:${{ github.ref_name }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
