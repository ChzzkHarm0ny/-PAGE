name: Update Chzzk Live Status

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run live status scraper
        run: |
          node -e '
          const fs = require("fs");
          const https = require("https");

          const channelIds = [
            "be242dede50d12910ae8d382f55b0ff7", // 망시
            "565d031e396d5b470a00325803563b29", // 찬울
            "25ec65d9bfdf37ac9f7ff50b75bfbe", // 카루하
            "39dda2e694fe6797cb9e6a12e84c2808", // 엄크술사
            "d52a1590fe8cb87e4afc3714e453864f", // 아모크
            "d27aa8b36153469303374ef5c695f0f7", // 은송아지
            "5cd51d3c832c0fd8b133d1e6ae08349c", // 고보미
            "19bff066c2a68a2f04d570f66b7ba869"  // 하늘루틴
          ];

          function fetchJson(url) {
            return new Promise((resolve) => {
              const options = {
                headers: {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36",
                  "Accept": "application/json, text/plain, */*",
                  "Referer": "https://chzzk.naver.com/"
                }
              };
              https.get(url, options, (res) => {
                let data = "";
                res.on("data", (chunk) => data += chunk);
                res.on("end", () => {
                  try {
                    resolve(JSON.parse(data));
                  } catch (e) {
                    resolve(null);
                  }
                });
              }).on("error", () => resolve(null));
            });
          }

          async function run() {
            const liveResults = {};

            for (const id of channelIds) {
              const json = await fetchJson(`https://api.chzzk.naver.com/service/v1/channels/${id}/live-detail`);
              if (json && json.code === 200 && json.content) {
                const live = json.content;
                // status가 OPEN이면 방송 중
                if (live.status === "OPEN") {
                  liveResults[id] = {
                    isLive: true,
                    liveTitle: live.liveTitle || "라이브 방송 중",
                    concurrentUserCount: live.concurrentUserCount || 0
                  };
                  console.log(`[LIVE] Found live for channel ${id}: ${live.liveTitle}`);
                }
              }
            }

            fs.writeFileSync("live-status.json", JSON.stringify({ updated_at: new Date().toISOString(), lives: liveResults }, null, 2));
            console.log("Live status updated successfully:", liveResults);
          }

          run();
          '

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.io"
          git add live-status.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update live status" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
